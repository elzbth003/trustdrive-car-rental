{% extends 'base.html' %}

{% block content %}
<section class="py-5">
    <div class="container pt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock display-4 text-accent"></i>
                        <h2 class="fw-bold mt-2">Secure Payment</h2>
                        <p class="text-muted small">Enter payment details for Booking #{{ booking.id }}</p>
                    </div>

                    <div class="bg-secondary bg-opacity-10 p-3 rounded mb-4 text-center">
                        <span class="small text-muted text-uppercase d-block mb-1">Total Amount</span>
                        <div class="h3 fw-bold mb-0">${{ booking.total_price }}</div>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label small text-muted">Payment Method</label>
                            <select name="method" class="form-select bg-dark text-white border-secondary border-opacity-25" required>
                                <option value="credit_card">Credit Card</option>
                                <option value="debit_card">Debit Card</option>
                                <option value="upi">UPI / GPay / PhonePe</option>
                                <option value="net_banking">Net Banking</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small text-muted">Card Details (Simulation)</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary border-opacity-25 mb-3" placeholder="Card Number" maxlength="19">
                            <div class="row">
                                <div class="col-6">
                                    <input type="text" class="form-control bg-dark text-white border-secondary border-opacity-25" placeholder="MM/YY">
                                </div>
                                <div class="col-6">
                                    <input type="password" class="form-control bg-dark text-white border-secondary border-opacity-25" placeholder="CVV">
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg py-3">Pay Now</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <i class="bi bi-lock me-1"></i> <span class="small text-muted">Encrypted secure transaction</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
