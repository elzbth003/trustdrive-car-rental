<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Journey Halted | TrustDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }
        .bg-404 {
            background-image: url('/static/images/404-bg.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 2rem;
            max-width: 600px;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -5px;
            opacity: 0.9;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 1.5rem;
            color: #ffc107;
        }
        .error-text {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .btn-home {
            background-color: #ffc107;
            color: #000;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            background-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-404">
        <div class="overlay"></div>
        <div class="content animate-fade-in">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Journey Halted</h2>
            <p class="error-text">
                It seems you've taken a detour into the unknown. The road you're looking for doesn't exist or has been abandoned in the sands of time.
            </p>
            <a href="/" class="btn-home">Return to Civilization</a>
        </div>
    </div>
</body>
</html>
