{% extends 'base.html' %}

{% block content %}
<section class="py-5">
    <div class="container pt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel text-center">
                    <i class="bi bi-exclamation-triangle display-1 text-danger mb-4"></i>
                    <h2 class="fw-bold mb-3">Confirm Delete</h2>
                    <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ car.name }}</strong>? This action cannot be undone.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-danger btn-lg py-3">Yes, Delete Vehicle</button>
                            <a href="{% url 'car_list_admin' %}" class="btn btn-outline-secondary py-3">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
